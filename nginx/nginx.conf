events {
    worker_connections 1024;
}

http {
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name localhost;

        # Forward headers correctly for client requests
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://frontend:3000;
        }

        location /api/auth {
            proxy_pass http://auth_service:8000;
        }

        location /api/meetings {
            proxy_pass http://meeting_service:8001;
        }

        location /api/faculties {
            proxy_pass http://meeting_service:8001;
        }

        location /api/departments {
            proxy_pass http://meeting_service:8001;
        }

        location /api/offices {
            proxy_pass http://meeting_service:8001;
        }

        location /api/members {
            proxy_pass http://meeting_service:8001;
        }

        location /api/templates {
            proxy_pass http://meeting_service:8001;
        }

        location /api/agendas {
            proxy_pass http://meeting_service:8001;
        }
        
        # Proxy file storage directly to MinIO
        location /storage/ {
            proxy_pass http://minio:9000/ecouncil-bucket/;
        }
        
    }
}
