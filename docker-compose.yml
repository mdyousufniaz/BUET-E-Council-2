services:
  db:
    image: docker.io/ankane/pgvector:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:9001}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # FIX: Wait until PostgreSQL is fully initialized
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  meeting_service:
    build:
      context: ./meeting_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      R3_REGION: ${R3_REGION}
      R3_ENDPOINT: ${R3_ENDPOINT}
      R3_ACCESS_KEY_ID: ${R3_ACCESS_KEY_ID}
      R3_SECRET_ACCESS_KEY: ${R3_SECRET_ACCESS_KEY}
      R3_BUCKET_NAME: ${R3_BUCKET_NAME}
      MAX_ANNEXURE_SIZE_MB: ${MAX_ANNEXURE_SIZE_MB:-20}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:9001}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM:-no-reply@buet-ecouncil.local}
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy # FIX: Wait until PostgreSQL is fully initialized
      minio:
        condition: service_healthy # FIX: Wait until MinIO is fully initialized
      redis:
        condition: service_healthy
      # embedding_service is intentionally NOT a hard dependency: it's behind
      # the "embeddings" profile (opt-in, see below) and every code path that
      # calls it (searchController.js, searchIndexer.js) already degrades to
      # keyword-only search if it's unreachable. Meeting management, viewing,
      # and keyword search all work fully without it.
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:8001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Runs indexAgendaContent/indexResolutionContent's queued embedding jobs
  # (utils/searchIndexer.js) out-of-process, so a burst of agenda saves can
  # never block the API event loop with CPU-heavy embedding work. Same image
  # as meeting_service, just a different entrypoint. Resource limits here are
  # a hard backstop; worker.js also self-throttles by polling its own cgroup
  # memory/CPU headroom and delaying jobs when it's tight.
  embedding_worker:
    profiles: ["embeddings"]
    build:
      context: ./meeting_service
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    mem_limit: 2g
    cpus: 1.5
    depends_on:
      db:
        condition: service_healthy
      embedding_service:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    # Internal-only, same reasoning as MinIO/embedding_service below: only
    # meeting_service and embedding_worker ever need to reach it.
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding_service:
    profiles: ["embeddings"]
    build:
      context: ./embedding_service
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    # Not published to the host: only meeting_service talks to it, over the
    # internal compose network (same reasoning as MinIO below).
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/login', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "9001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      frontend:
        condition: service_healthy # FIX: Wait until Next.js has finished booting
      auth_service:
        condition: service_healthy # FIX: Wait until the API is accepting requests
      meeting_service:
        condition: service_healthy # FIX: Wait until the API is accepting requests

  minio:
    image: minio/minio
    # Not published to the host: the app only ever talks to MinIO over the
    # internal compose network (meeting_service reads/writes with its own
    # credentials; nginx proxies /storage/ to meeting_service's authenticated
    # route, not to MinIO directly). Publishing 9000/9090 would expose the
    # S3 API and admin console straight to the internet.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9090"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb myminio/${R3_BUCKET_NAME} --ignore-existing; /usr/bin/mc anonymous set none myminio/${R3_BUCKET_NAME}; tail -f /dev/null; "

volumes:
  pgdata:
  minio_data:
