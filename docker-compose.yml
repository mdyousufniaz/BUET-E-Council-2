services:
  db:
    image: docker.io/ankane/pgvector:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # FIX: Wait until PostgreSQL is fully initialized
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  meeting_service:
    build:
      context: ./meeting_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      R3_REGION: ${R3_REGION}
      R3_ENDPOINT: ${R3_ENDPOINT}
      R3_ACCESS_KEY_ID: ${R3_ACCESS_KEY_ID}
      R3_SECRET_ACCESS_KEY: ${R3_SECRET_ACCESS_KEY}
      R3_BUCKET_NAME: ${R3_BUCKET_NAME}
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy # FIX: Wait until PostgreSQL is fully initialized
      minio:
        condition: service_healthy # FIX: Wait until MinIO is fully initialized
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:8001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/login', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "9001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      frontend:
        condition: service_healthy # FIX: Wait until Next.js has finished booting
      auth_service:
        condition: service_healthy # FIX: Wait until the API is accepting requests
      meeting_service:
        condition: service_healthy # FIX: Wait until the API is accepting requests

  minio:
    image: minio/minio
    # Not published to the host: the app only ever talks to MinIO over the
    # internal compose network (meeting_service uploads server-side, nginx
    # proxies public file reads via /storage/). Publishing 9000/9090 would
    # expose the S3 API and admin console straight to the internet.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9090"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb myminio/${R3_BUCKET_NAME} --ignore-existing; /usr/bin/mc anonymous set public myminio/${R3_BUCKET_NAME}; tail -f /dev/null; "

volumes:
  pgdata:
  minio_data:
