name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup environment variables for CI
        run: cp .env.example .env

      - name: Build Docker Compose Services
        run: docker compose build

      - name: Start Services and Wait
        run: docker compose up -d --wait

      - name: Test Auth Service Health
        run: curl --fail --retry 5 --retry-delay 5 --retry-connrefused http://localhost:8000/health || exit 1

      - name: Test Meeting Service Health
        run: curl --fail --retry 5 --retry-delay 5 --retry-connrefused http://localhost:8001/health || exit 1

      - name: Test Next.js Frontend Delivery
        run: curl --fail --retry 5 --retry-delay 5 --retry-connrefused http://localhost:3000 || exit 1

      - name: Show Docker Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Stop Services
        if: always()
        run: docker compose down