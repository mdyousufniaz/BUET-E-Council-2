name: Deploy to Azure VM

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy project files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.VM_USER }}/buet_ecouncil"

      - name: Execute deployment commands on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER }}/buet_ecouncil

            # --- UPDATED: COMPREHENSIVE VARIABLE INJECTION ---
            echo "Generating .env file from GitHub Secrets and Variables..."
            cat <<EOF > .env
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            DATABASE_URL=${{ vars.DATABASE_URL }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            MINIO_ROOT_USER=${{ vars.MINIO_ROOT_USER }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            R3_REGION=${{ vars.R3_REGION }}
            R3_ENDPOINT=${{ vars.R3_ENDPOINT }}
            R3_ACCESS_KEY_ID=${{ vars.R3_ACCESS_KEY_ID }}
            R3_SECRET_ACCESS_KEY=${{ secrets.R3_SECRET_ACCESS_KEY }}
            R3_BUCKET_NAME=${{ vars.R3_BUCKET_NAME }}
            BACKEND_URL=${{ vars.BACKEND_URL }}
            EOF
            # -------------------------------------------------

            docker compose pull
            docker compose down
            docker compose up -d --build --wait
            docker system prune -f